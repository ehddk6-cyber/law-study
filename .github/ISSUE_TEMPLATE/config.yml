name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Briefly describe the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs/Error Messages
      description: Paste any relevant logs or error messages
      render: shell
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, etc.
      placeholder: "e.g., Ubuntu 22.04, Python 3.10"

---

name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem?
      placeholder: "I'm always frustrated when..."
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Have you considered any alternatives?
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context or screenshots

---

name: 🔧 Refactoring
description: Propose code refactoring or structural improvements
title: "[REFACTOR] "
labels: ["refactoring"]
body:
  - type: textarea
    id: current
    attributes:
      label: Current Structure
      description: Describe the current code structure
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed Improvement
      description: What improvements do you suggest?
    validations:
      required: true
  - type: textarea
    id: benefits
    attributes:
      label: Benefits
      description: How will this improve the codebase?
  - type: input
    id: priority
    attributes:
      label: Priority
      description: How urgent is this refactoring?
      placeholder: "High/Medium/Low"

---

name: 📝 Documentation
description: Report documentation issues or suggest improvements
title: "[DOCS] "
labels: ["documentation"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Documentation Type
      options:
        - README update
        - API documentation
        - Code comments
        - Tutorial/Guide
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What documentation changes do you suggest?
    validations:
      required: true

---

name: ✅ Test Coverage
description: Suggest new tests or test improvements
title: "[TEST] "
labels: ["testing"]
body:
  - type: input
    id: component
    attributes:
      label: Component
      description: Which component needs testing?
      placeholder: "e.g., services/precedent_service.py"
  - type: textarea
    id: current_coverage
    attributes:
      label: Current Test Coverage
      description: What's currently tested (if anything)?
  - type: textarea
    id: proposed_tests
    attributes:
      label: Proposed Test Cases
      description: What test cases should be added?
      value: |
        - [ ] Test case 1
        - [ ] Test case 2
        - [ ] Test case 3
  - type: input
    id: priority
    attributes:
      label: Priority
      description: How critical is this test coverage?
      placeholder: "High/Medium/Low"
