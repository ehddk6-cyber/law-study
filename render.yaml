services:
  - type: web
    name: law-open-data-dedicated-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.main
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8099
      - key: LOG_LEVEL
        value: INFO
      - key: RELOAD
        value: false
      - key: LAW_API_KEY
        sync: false
